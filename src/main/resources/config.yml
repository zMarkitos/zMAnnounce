# ===========================================================
#
#                         zMAnnounce
#                Velocity Announcement System
# ===========================================================
# zMAnnounce Configuration
# Global announcement system for Velocity networks
# Author: zMarkitos_
#
# Supports:
# - Global announcements
# - Per-server announcements
# - Bossbar announcements
# - Titles
# - Sounds
#
# Colors:
# Supports Minecraft color codes (&) and HEX colors.
# Example: &6Gold text or &#FFC930Hex color
# ===========================================================

announce-template:

  # Sound played when the announcement is sent
  # List of sounds: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
  sound: "BLOCK_NOTE_BLOCK_PLING"

  title:

    # Enable or disable title announcement
    enabled: true

    # Title animation settings (in ticks)
    fadein: 10
    stay: 70
    fadeout: 20

    # Title text
    title: "&#FFC930&lANNOUNCEMENT"

    # Subtitle text
    subtitle: "&fCheck the chat!"

  # Chat messages sent with the announcement
  # %message% will be replaced with the message from the command
  messages:
    - "&8&m----------------------------------------"
    - "&#FFC930&lSERVER ANNOUNCEMENT"
    - ""
    - "&f%message%"
    - ""
    - "&7&o(( Stay tuned for server announcements))"
    - "&8&m----------------------------------------"


# =========================================================
# Bossbar Settings
# Used when executing the bossbar announcement command
# =========================================================
bossbar:

  # Bossbar color
  # Options: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
  color: YELLOW

  # Bossbar style
  # Options: PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
  overlay: PROGRESS

  # Sound played when the bossbar starts
  sound-start: "BLOCK_NOTE_BLOCK_PLING"

  # Sound played when the bossbar ends
  sound-end: "ENTITY_PLAYER_LEVELUP"

  # Title shown when the bossbar finishes
  end-title:

    # Title animation settings
    fadein: 10
    stay: 60
    fadeout: 10

    # Title text
    title: "&6Event Started!"

    # Subtitle text
    subtitle: "&fGood luck!"


# =========================================================
# Security Settings
# Prevents spam and potential exploits
# =========================================================
security:
  # Maximum length allowed for announcement messages
  max-message-length: 500

  # Cooldown between announcements (seconds)
  # Prevents spam commands
  announcement-cooldown-seconds: 2

  # Maximum duration allowed for bossbars
  # Example allowed formats: 10s, 5m, 1h
  max-bossbar-duration-minutes: 60

  # Maximum bossbars that can exist at the same time
  # Prevents network spam and performance issues
  max-active-bossbars: 3


# =========================================================
# Performance Settings
# Used to optimize the plugin for large networks
# =========================================================
performance:
  # Enables caching for formatted colors
  # Recommended to keep enabled
  enable-color-cache: true

  # Maximum number of cached formatted messages
  # Prevents unlimited memory growth
  max-color-cache-size: 500


# =========================================================
# Update Checker Settings
# Automatically checks for new versions on Modrinth
# =========================================================
updates:
  # Enable automatic update checking
  # Set to false to disable version checks
  check-for-updates: true

  # Notify players when they join if a new version is available
  # Shows a chat message and title notification
  notify-players-on-join: true


# =========================================================
# Plugin Messages
# You can fully customize all plugin messages here
# =========================================================
messages:
  no-permission-reload: "&cYou do not have permission: zmannounce.reload"
  no-permission-bossbar: "&cYou do not have permission: zmannounce.bossbar"
  no-permission-use: "&cYou do not have permission: zmannounce.use"
  config-reloaded: "&aConfig reloaded successfully"
  config-reload-failed: "&cFailed to reload config.yml. Check console for details."
  announcement-usage: "&cUsage: /zmannounce alert <message> <server|all>"
  announcement-sent: "&aAnnouncement sent to &e%target%&a. Recipients: &e%recipientCount%"
  bossbar-usage: "&cUsage: /zmannounce bossbar <message> <time> <server|all>"
  bossbar-invalid-time: "&cInvalid time format. Use: 10s, 15m, 1h"
  bossbar-started: "&aBossbar started for &e%target%&a. Recipients: &e%recipientCount%"
  message-too-long: "&cMessage too long. Max %maxLength% characters."
  announcement-cooldown: "&cPlease wait %remainingSeconds% seconds before sending another announcement."
  bossbar-duration-too-long: "&cBossbar duration too long. Max %maxLimit%."
  too-many-active-bossbars: "&cMaximum active bossbars reached."
  bossbar-cooldown: "&cPlease wait %remainingSeconds% seconds before starting another bossbar."
  help-announce: "&e/zmannounce alert <message> <server|all>"
  help-bossbar: "&e/zmannounce bossbar <message> <time> <server|all>"
  help-reload: "&e/zmannounce reload"

# Do not modify
version: 1